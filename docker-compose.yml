# Example: add to your existing *arr docker-compose stack
services:
  doctarr:
    image: ghcr.io/codewarrior4life/doctarr:latest
    container_name: doctarr
    environment:
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=your-api-key-here
      # Optional (defaults shown):
      # - DISCOVERY_INTERVAL=6h
      # - TEST_INTERVAL=2h
      # - PRUNE_INTERVAL=1h
      # - PRUNE_THRESHOLD=12h
      # - TEST_DELAY=2s
      # - WEBHOOK_URL=https://discord.com/api/webhooks/your/webhook
      # - WEBHOOK_EVENTS=added,pruned,digest
      # - DIGEST_TIME=08:00
      # - LOG_LEVEL=info
      - TZ=America/New_York
    volumes:
      - ./config/doctarr:/config
    restart: unless-stopped
